type User {
    id: ID!
    name: String!
    email: String!
    password: String!
    age: Int
}

type AuthPayload {
    token: String
    user: User
}

type Query {
    hello: String
    usersGet: [User!]!
    userGet(id: ID!): User
}

type Mutation {
    signup(name: String!, email: String!, password: String!, age: Int) : AuthPayload
    logIn( email: String!, password: String!) : AuthPayload
}