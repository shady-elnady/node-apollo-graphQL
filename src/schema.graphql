type User {
    id: ID!
    name: String!
    email: String!
    password: String!
    links: [Link!]!
}

type Link {
    id: ID!
    title: String!
    url: String!
    description: String!
    postedBy: User
}

type AuthPayload {
    token: String
    user: User
}

type Query {
    hello: String
    usersGet: [User!]!
    userGet(id: ID!): User
    links: [Link]!
}

type Mutation {
    signup(name: String!, email: String!, password: String!, age: Int) : AuthPayload
    logIn( email: String!, password: String!) : AuthPayload
}